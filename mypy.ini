[mypy]
python_version = 3.11
# jax and jaxtyping ship py.typed; this is kept only for chex/optax which
# have partial stubs. Run mypy in an env where the runtime deps are installed
# (e.g. `mypy --python-executable .venv/bin/python core problems`) — otherwise
# jax/jaxtyping collapse to Any and every Float[Array, ...] alias breaks.
ignore_missing_imports = True

# The library code (core/, problems/) is fully typed — enforce it.
check_untyped_defs = True
disallow_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True

# Skip the legacy code entirely (now under legacy/):
exclude = ^legacy/

# Tests are exploratory and intentionally loosely typed.
[mypy-tests.*]
disallow_untyped_defs = False
